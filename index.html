<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EPUB Reader</title>

  <!-- Vanilla Breeze: layered HTML component system (used for the app shell only). -->
  <link rel="stylesheet" href="https://unpkg.com/vanilla-breeze/dist/cdn/vanilla-breeze.css" />
  <script type="module" src="https://unpkg.com/vanilla-breeze/dist/cdn/vanilla-breeze.js"></script>

  <!-- The reader custom element. Dependency-free vanilla JS. -->
  <script type="module" src="./src/epub-reader.js"></script>

  <style>
    /* Fallback app-shell styles in case vanilla-breeze doesn't load. */
    :root {
      --vb-color-surface: #fbfaf7;
      --vb-color-text: #1f1f1f;
      --vb-color-muted: #667085;
      --vb-color-primary: #2d6cdf;
      --vb-color-border: #e4e4e7;
      color-scheme: light dark;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --vb-color-surface: #17181b;
        --vb-color-text: #f5f5f5;
        --vb-color-muted: #9aa0a6;
        --vb-color-primary: #6aa7ff;
        --vb-color-border: #2a2c31;
      }
    }
    html, body { block-size: 100%; margin: 0; }
    body {
      font-family: var(--vb-font-body, system-ui, -apple-system, "Segoe UI", sans-serif);
      background: var(--vb-color-surface);
      color: var(--vb-color-text);
      display: grid;
      grid-template-rows: auto 1fr;
      min-block-size: 100%;
    }

    .app-header {
      display: flex;
      gap: .75rem;
      align-items: center;
      padding: .75rem 1rem;
      border-block-end: 1px solid var(--vb-color-border);
      background: var(--vb-color-surface);
    }
    .app-header h1 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0;
      margin-inline-end: auto;
    }
    .app-header h1 small { font-weight: 400; color: var(--vb-color-muted); margin-inline-start: .5rem; }

    .picker {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .4rem .7rem;
      border: 1px solid var(--vb-color-border);
      border-radius: .4rem;
      background: transparent;
      color: inherit;
      cursor: pointer;
      font: inherit;
    }
    .picker:hover { background: color-mix(in srgb, var(--vb-color-primary) 8%, transparent); }
    .picker input { display: none; }

    main#app {
      position: relative;
      min-block-size: 0;
      overflow: hidden;
    }

    epub-reader { block-size: 100%; }

    .drop-hint {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      pointer-events: none;
      z-index: 10;
      padding: 2rem;
      text-align: center;
      background: color-mix(in srgb, var(--vb-color-primary) 10%, transparent);
      outline: 3px dashed var(--vb-color-primary);
      outline-offset: -.75rem;
      color: var(--vb-color-text);
      font-weight: 600;
    }
    body.dragging .drop-hint { display: grid; }

    .samples {
      color: var(--vb-color-muted);
      font-size: .9rem;
    }
    .samples a { color: var(--vb-color-primary); }

    .sample-bar {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      align-items: center;
      padding: .5rem 1rem;
      border-block-end: 1px solid var(--vb-color-border);
      background: var(--vb-color-surface);
      font-size: .85rem;
    }
    .sample-bar[hidden] { display: none; }
    .sample-bar .label {
      color: var(--vb-color-muted);
      margin-inline-end: .25rem;
    }
    .sample-bar button {
      font: inherit;
      color: inherit;
      background: transparent;
      border: 1px solid var(--vb-color-border);
      border-radius: .35rem;
      padding: .25rem .55rem;
      cursor: pointer;
      display: inline-flex;
      gap: .35rem;
      align-items: baseline;
    }
    .sample-bar button:hover:not(:disabled) {
      background: color-mix(in srgb, var(--vb-color-primary) 8%, transparent);
    }
    .sample-bar button.current {
      border-color: var(--vb-color-primary);
      background: color-mix(in srgb, var(--vb-color-primary) 12%, transparent);
    }
    .sample-bar button:disabled { opacity: .5; cursor: progress; }
    .sample-bar .size {
      color: var(--vb-color-muted);
      font-size: .85em;
    }
  </style>
</head>
<body>
  <header class="app-header" data-layout="cluster">
    <h1>EPUB Reader <small id="book-subtitle">choose a sample below or open your own</small></h1>
    <span class="samples">
      <a href="https://github.com/ProfPowell/epub-reader" target="_blank" rel="noopener">View on GitHub</a>
    </span>
    <label class="picker">
      <span>Open EPUB&hellip;</span>
      <input id="file" type="file" accept=".epub,application/epub+zip" />
    </label>
  </header>

  <nav class="sample-bar" id="sample-bar" hidden aria-label="Sample books">
    <span class="label">Try a sample:</span>
  </nav>

  <main id="app" data-layout="stack">
    <epub-reader id="reader"></epub-reader>
    <div class="drop-hint">Drop EPUB file to open</div>
  </main>

  <script type="module">
    const reader = document.getElementById('reader');
    const fileInput = document.getElementById('file');
    const subtitle = document.getElementById('book-subtitle');
    const sampleBar = document.getElementById('sample-bar');
    const body = document.body;

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      if (file) { reader.open(file); markCurrent(null); }
      fileInput.value = '';
    });

    reader.addEventListener('epub-loaded', (e) => {
      const { metadata, spineLength } = e.detail;
      const parts = [];
      if (metadata.title) parts.push(metadata.title);
      if (metadata.creator) parts.push('by ' + metadata.creator);
      parts.push(`(${spineLength} sections)`);
      subtitle.textContent = parts.join(' ');
    });
    reader.addEventListener('epub-error', (e) => {
      subtitle.textContent = 'Error: ' + (e.detail.error?.message || e.detail.error);
    });

    // Sample picker. Reads samples/demo.json and shows a button per entry.
    // The same manifest drives the GitHub Pages deploy (workflow copies
    // every file referenced here into the deploy artifact).
    /** @type {Promise<any>} */
    const manifestPromise = fetch('./samples/demo.json', { cache: 'no-cache' })
      .then(res => res.ok ? res.json() : null)
      .catch(() => null);

    manifestPromise.then((manifest) => {
      if (!manifest?.samples?.length) return;
      sampleBar.hidden = false;
      for (const s of manifest.samples) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.dataset.file = s.file;
        btn.title = s.description || s.title;
        btn.innerHTML = `<span>${s.title}</span><span class="size">${s.size || ''}</span>`;
        btn.addEventListener('click', () => loadSample(s.file, btn));
        sampleBar.append(btn);
      }
    });

    /**
     * Fetch a sample from the deployed `samples/` directory and open it.
     * Using a Blob avoids a second round-trip via the reader's URL fetch.
     */
    async function loadSample(file, btn) {
      const buttons = [...sampleBar.querySelectorAll('button')];
      buttons.forEach(b => b.disabled = true);
      try {
        const res = await fetch(`./samples/${encodeURIComponent(file)}`, { cache: 'force-cache' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const blob = await res.blob();
        await reader.open(blob);
        markCurrent(btn);
      } catch (err) {
        subtitle.textContent = 'Failed to load sample: ' + (err.message || err);
      } finally {
        buttons.forEach(b => b.disabled = false);
      }
    }

    function markCurrent(btn) {
      for (const b of sampleBar.querySelectorAll('button')) b.classList.remove('current');
      if (btn) btn.classList.add('current');
    }

    // Drag-and-drop anywhere in the window to open an EPUB.
    let dragDepth = 0;
    window.addEventListener('dragenter', (e) => {
      if (!e.dataTransfer?.types?.includes('Files')) return;
      dragDepth++; body.classList.add('dragging');
    });
    window.addEventListener('dragleave', () => {
      dragDepth = Math.max(0, dragDepth - 1);
      if (!dragDepth) body.classList.remove('dragging');
    });
    window.addEventListener('dragover', (e) => {
      if (e.dataTransfer?.types?.includes('Files')) e.preventDefault();
    });
    window.addEventListener('drop', (e) => {
      dragDepth = 0; body.classList.remove('dragging');
      const file = e.dataTransfer?.files?.[0];
      if (file && /\.epub$/i.test(file.name)) {
        e.preventDefault();
        reader.open(file);
        markCurrent(null);
      }
    });

    // Query-string overrides:
    //   ?src=<url>     auto-load an arbitrary URL via the reader's fetch path
    //   ?sample=<file> auto-load one of the bundled demo samples by name
    const q = new URLSearchParams(location.search);
    if (q.has('src')) {
      reader.setAttribute('src', q.get('src'));
    } else if (q.has('sample')) {
      manifestPromise.then((manifest) => {
        if (!manifest) return;
        const want = q.get('sample');
        const match = manifest.samples.find(s => s.file === want || s.title === want);
        if (match) {
          const btn = sampleBar.querySelector(`button[data-file="${CSS.escape(match.file)}"]`);
          loadSample(match.file, btn);
        }
      });
    }
  </script>
</body>
</html>
